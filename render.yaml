services:
  - type: web
    name: speedcoding-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: INVIGILATOR_CODE
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: JUDGE0_URL
        value: https://ce.judge0.com
