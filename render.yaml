services:
  # ── Backend API ───────────────────────────────────────────────
  - type: web
    name: speeding-coding-api
    env: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # Set this in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Auto-generated by Render
      - key: ADMIN_PASSWORD
        sync: false          # Set in Render dashboard
      - key: INVIGILATOR_CODE
        sync: false          # Set in Render dashboard
      - key: CLIENT_URL
        sync: false          # Set to your frontend URL after deploy

  # ── Frontend (Static Site) ────────────────────────────────────
  - type: web
    name: speeding-coding-client
    env: static
    region: singapore
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to your backend URL e.g. https://speeding-coding-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
